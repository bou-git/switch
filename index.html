<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Strapi Server Control Panel</title>
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
    <style>
        /* CSS resets and variables */
        :root {
            --primary-color: #4f46e5;
            --primary-hover: #4338ca;
            --bg-color: #f3f4f6;
            --card-bg: #ffffff;
            --text-main: #111827;
            --text-muted: #6b7280;
            --border-color: #e5e7eb;
            --error-color: #ef4444;
            --success-color: #10b981;
            --dev-color: #f59e0b;
        }
        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }
        
        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* Container styles */
        .container {
            width: 100%;
            max-width: 1900px;
            padding: 1rem;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            padding: 2.5rem;
            width: 100%;
            transition: all 0.3s ease;
        }

        /* Login specifically */
        .login-card {
            max-width: 400px;
            margin: 0 auto;
        }

        /* Headers */
        h1 {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: var(--text-main);
            text-align: center;
        }

        p.subtitle {
            color: var(--text-muted);
            font-size: 0.875rem;
            text-align: center;
            margin-bottom: 2rem;
        }

        /* Forms */
        .form-group {
            margin-bottom: 1.25rem;
        }

        label {
            display: block;
            font-size: 0.875rem;
            font-weight: 500;
            margin-bottom: 0.5rem;
            color: var(--text-main);
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 1rem;
            transition: border-color 0.2s, box-shadow 0.2s;
            outline: none;
            background-color: #fff;
            color: var(--text-main);
        }

        /* Specific padding for password to avoid icon overlap */
        input#password {
            padding-right: 2.75rem;
        }

        input[type="text"]:focus,
        input[type="password"]:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }

        /* Buttons */
        .btn {
            display: inline-flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            padding: 0.75rem 1.5rem;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 0.875rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s, opacity 0.2s, transform 0.1s;
        }

        .btn:hover:not(:disabled) {
            background-color: var(--primary-hover);
        }

        .btn:active:not(:disabled) {
            transform: translateY(1px);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .btn-dev {
            background-color: var(--dev-color);
            color: white;
        }
        .btn-dev:hover:not(:disabled) { background-color: #d97706; }

        .btn-prod {
            background-color: var(--success-color);
            color: white;
        }
        .btn-prod:hover:not(:disabled) { background-color: #059669; }

        .btn-restart {
            background-color: #3b82f6;
            color: white;
        }
        .btn-restart:hover:not(:disabled) { background-color: #2563eb; }

        /* Password Toggle */
        .password-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .password-toggle {
            position: absolute;
            right: 12px;
            background: none;
            border: none;
            padding: 0;
            cursor: pointer;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: color 0.2s;
            z-index: 10;
        }

        .password-toggle:hover {
            color: var(--text-main);
        }

        .password-toggle svg {
            width: 20px;
            height: 20px;
        }

        /* Error message */
        .error-message {
            color: var(--error-color);
            font-size: 0.875rem;
            margin-top: 1rem;
            text-align: center;
            display: none;
            font-weight: 500;
        }

        /* Layout changes */
        #control-panel-view {
            display: none;
        }

        /* Control Panel Header */
        .cp-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border-color);
        }
        .cp-title h1 {
            text-align: left;
            margin-bottom: 0.25rem;
        }

        /* Status Badge */
        .badge {
            padding: 0.35rem 0.85rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .badge.prod {
            background-color: rgba(16, 185, 129, 0.1);
            color: var(--success-color);
            border: 1px solid rgba(16, 185, 129, 0.2);
        }
        .badge.dev {
            background-color: rgba(245, 158, 11, 0.1);
            color: var(--dev-color);
            border: 1px solid rgba(245, 158, 11, 0.2);
        }

        /* Actions area */
        .actions {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        /* Terminal Logs */
        .logs-section {
            margin-top: 2rem;
        }
        .logs-header {
            display: flex;
            align-items: center;
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 0.75rem;
            color: var(--text-main);
        }
        .terminal {
            background-color: #1e1e1e;
            color: #d1d5db;
            font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
            padding: 1rem;
            border-radius: 8px;
            height: 400px;
            overflow-y: auto;
            font-size: 0.875rem;
            line-height: 1.5;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.5);
            border: 1px solid #374151;
            white-space: pre-wrap;
        }
        .terminal::-webkit-scrollbar {
            width: 8px;
        }
        .terminal::-webkit-scrollbar-track {
            background: #111;
            border-radius: 0 8px 8px 0;
        }
        .terminal::-webkit-scrollbar-thumb {
            background: #4b5563;
            border-radius: 4px;
        }
        .terminal::-webkit-scrollbar-thumb:hover {
            background: #6b7280;
        }
        
        .log-line {
            margin-bottom: 0.25rem;
            word-break: break-all;
        }
        .log-time {
            color: #6b7280;
            margin-right: 0.5rem;
            user-select: none;
        }
        .log-source {
            font-weight: 600;
            margin-right: 0.5rem;
        }
        .log-info { color: #60a5fa; }
        .log-warn { color: #fbbf24; }
        .log-error { color: #f87171; }
        .log-success { color: #4ade80; }
        .log-system { color: #a78bfa; }
        .pulse {
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: .5;
            }
        }
        
        @media (max-width: 640px) {
            .cp-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 1rem;
            }
        }
    </style>
</head>
<body>

<div class="container" id="app-container">
    <!-- Login View -->
    <div class="card login-card" id="login-view">
        <div style="text-align: center; margin-bottom: 2rem;">
            <!-- Premium Security/Server Icon -->
            <div style="position: relative; width: 64px; height: 64px; margin: 0 auto;">
                <div style="position: absolute; inset: 0; background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%); border-radius: 16px; transform: rotate(-10deg); opacity: 0.1;"></div>
                <div style="position: absolute; inset: 0; background: white; border-radius: 16px; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); display: flex; align-items: center; justify-content: center;">
                    <img src="favicon.ico" alt="Server Icon" style="width: 42px; height: 42px; object-fit: contain;">
                </div>
            </div>
        </div>
        <h1>Server Control Panel</h1>
        <p class="subtitle">Authenticate to manage your Strapi instance</p>
        
        <form id="login-form">
            <div class="form-group">
                <label for="username">Email</label>
                <input type="text" id="username" placeholder="infraadmin@bou.or.ug" required autocomplete="username">
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <div class="password-wrapper">
                    <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
                    <button type="button" class="password-toggle" id="toggle-password" tabindex="-1">
                        <svg id="eye-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                            <circle cx="12" cy="12" r="3"></circle>
                        </svg>
                    </button>
                </div>
            </div>
            
            <button type="submit" class="btn" id="login-btn">Secure Login</button>
            <div class="error-message" id="login-error">Invalid email or password.</div>
        </form>
    </div>

    <!-- Control Panel View -->
    <div class="card" id="control-panel-view">
        <div class="cp-header">
            <div class="cp-title">
                <h1>Strapi Server Administration</h1>
                <p class="subtitle" style="text-align: left; margin-bottom: 0;">Manage deployment state and monitor server logs</p>
            </div>
            <div class="cp-status">
                <span class="badge prod" id="status-badge">Mode: Production</span>
            </div>
        </div>

        <div class="actions">
            <!-- Normal Buttons -->
            <button class="btn btn-dev" id="btn-dev" onclick="initiateSwitch('dev')">
                <svg style="width:18px;height:18px;margin-right:8px;" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4"></path>
                </svg>
                Switch to Development Mode
            </button>
            <button class="btn btn-prod" id="btn-prod" onclick="initiateSwitch('prod')">
                <svg style="width:18px;height:18px;margin-right:8px;" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path>
                </svg>
                Switch to Production (Build + Start)
            </button>
            <button class="btn btn-restart" id="btn-restart-dev" onclick="restartService('dev')">
                <svg style="width:18px;height:18px;margin-right:8px;" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path>
                </svg>
                Restart Development Server
            </button>
            <button class="btn btn-restart" id="btn-restart-prod" onclick="restartService('prod')">
                <svg style="width:18px;height:18px;margin-right:8px;" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path>
                </svg>
                Restart Production Server
            </button>
        </div>

        <div class="logs-section">
            <div class="logs-header">
                <svg style="width:18px;height:18px;margin-right:8px;color:#6b7280" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
                </svg>
                Server Console Logs
            </div>
            <div class="terminal" id="terminal-logs">
                <!-- Logs will be dynamically appended here -->
            </div>
        </div>
    </div>
</div>

<script>
    const CONFIG = {
        API_URL: 'https://bouweb-test.bou.or.ug', // Strapi backend API
        MANAGER_URL: 'https://bouweb-test.bou.or.ug/infra' // Local control manager API mapped via IIS Proxy
    };

    

    // --- DOM Elements ---
    const ui = {
        views: {
            login: document.getElementById('login-view'),
            controlPanel: document.getElementById('control-panel-view')
        },
        login: {
            form: document.getElementById('login-form'),
            user: document.getElementById('username'),
            pass: document.getElementById('password'),
            btn: document.getElementById('login-btn'),
            error: document.getElementById('login-error')
        },
        cp: {
            badge: document.getElementById('status-badge'),
            btnDev: document.getElementById('btn-dev'),
            btnProd: document.getElementById('btn-prod'),
            btnRestartDev: document.getElementById('btn-restart-dev'),
            btnRestartProd: document.getElementById('btn-restart-prod'),
            terminal: document.getElementById('terminal-logs')
        }
    };

    // --- State Management ---
    const state = {
        mode: 'prod', // 'prod' | 'dev' | 'transitioning'
        actualEnvironment: 'production', // 'production' | 'development'
        isProcessing: false,
        logEventSource: null,
        token: null
    };

    // --- Show Password Toggle ---
    const togglePasswordBtn = document.getElementById('toggle-password');
    const eyeIcon = document.getElementById('eye-icon');
    
    togglePasswordBtn.addEventListener('click', () => {
        const type = ui.login.pass.getAttribute('type') === 'password' ? 'text' : 'password';
        ui.login.pass.setAttribute('type', type);
        
        // Update Icon
        if (type === 'text') {
            eyeIcon.innerHTML = `
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
                <line x1="1" y1="1" x2="23" y2="23"></line>
            `;
        } else {
            eyeIcon.innerHTML = `
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                <circle cx="12" cy="12" r="3"></circle>
            `;
        }
    });

    // --- View Transitions ---
    function navigateTo(view) {
        Object.values(ui.views).forEach(v => v.style.display = 'none');
        ui.views[view].style.display = 'block';
    }

    function handleLogout(message = "Session expired. Please log in again.") {
        localStorage.removeItem('strapi_manager_token');
        state.token = null;
        state.isProcessing = false;
        
        stopLogStream();
        
        ui.login.error.textContent = message;
        ui.login.error.style.display = 'block';
        ui.login.btn.disabled = false;
        ui.login.btn.textContent = 'Secure Login';
        
        navigateTo('login');
    }

    async function initControlPanel() {
        navigateTo('controlPanel');
        streamNativeLog('SYSTEM', 'Admin user authenticated successfully.', 'success');
        
        try {
            // Check what the server is currently doing
            const statusRes = await fetch(`${CONFIG.MANAGER_URL}/status`);
            
            if (statusRes.ok) {
                const serverData = await statusRes.json();
                state.mode = serverData.currentMode;
                state.actualEnvironment = serverData.actualEnvironment;
                state.targetMode = serverData.targetMode;
                updateBadgeUI(serverData.progressMessage);

                if (serverData.isProcessing) {
                    state.isProcessing = true;
                    toggleButtons(false);
                    streamNativeLog('SYSTEM', serverData.progressMessage || 'A server process is currently running in the background. Resuming stream...', 'warn');
                    startStatusPolling(); // Poll to know when it finishes
                }
            }
        } catch (e) {
            console.warn("Could not fetch initial server status", e);
        }

        setTimeout(() => {
            updateBadgeUI();
            
            // Always stream the control logs instead of target environment logs to see the manager actions
            startLogStream('control');
        }, 800);
    }
    
    // Polling mechanism to unlock UI when background task finishes
    let statusInterval;
    let lastProgressMessage = '';
    
    function startStatusPolling() {
        if (statusInterval) clearInterval(statusInterval);
        statusInterval = setInterval(async () => {
            try {
                const statusRes = await fetch(`${CONFIG.MANAGER_URL}/status`);
                if (statusRes.ok) {
                    const serverData = await statusRes.json();
                    
                    // Log progress updates if they change
                    if (serverData.progressMessage && serverData.progressMessage !== lastProgressMessage) {
                         streamNativeLog('SYSTEM', `[DB STATUS] ${serverData.progressMessage}`, 'info');
                         lastProgressMessage = serverData.progressMessage;
                    }
                    
                    if (!serverData.isProcessing && state.isProcessing) {
                        // Server just finished!
                        state.isProcessing = false;
                        state.mode = serverData.currentMode;
                        state.actualEnvironment = serverData.actualEnvironment;
                        state.targetMode = null;
                        updateBadgeUI();
                        toggleButtons(true);
                        clearInterval(statusInterval);
                        streamNativeLog('SYSTEM', 'Background process completed successfully.', 'success');
                    } else if (serverData.isProcessing) {
                        state.mode = serverData.currentMode;
                        state.actualEnvironment = serverData.actualEnvironment;
                        state.targetMode = serverData.targetMode;
                        updateBadgeUI(serverData.progressMessage);
                    }
                }
            } catch (e) {
                // Ignore temporary network drops
            }
        }, 5000); // Check every 5 seconds
    }

    // --- Login Logic ---
    ui.login.form.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        ui.login.btn.disabled = true;
        ui.login.btn.innerHTML = `<span class="pulse">Authenticating...</span>`;
        ui.login.error.style.display = 'none';

        try {
            const loginRes = await fetch(`${CONFIG.MANAGER_URL}/api/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    email: ui.login.user.value,
                    password: ui.login.pass.value
                })
            });

            if (!loginRes.ok) {
                // Determine if it was a server error (503) or pure auth failure
                if (loginRes.status === 503) {
                    throw new Error('Authentication backend is offline and backup credentials did not match.');
                }
                throw new Error('Invalid email or password.');
            }

            const loginData = await loginRes.json();
            const token = loginData.data.token;
            state.token = token; // Store token globally for manager API calls
            localStorage.setItem('strapi_manager_token', token); // Persist

            // If we're logged in using the fallback token, /admin/users/me will fail (Strapi is down).
            // So we hit it but don't strictly require it if the server is down.
            try {
                const meRes = await fetch(`${CONFIG.API_URL}/admin/users/me`, {
                    method: 'GET',
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (meRes.ok) {
                    const meData = await meRes.json();
                    const roles = meData.data.roles || [];
                    const isInfraAdmin = roles.some(r => r.name === 'Infra Admin');

                    if (!isInfraAdmin) {
                        throw new Error('Access Denied: Only Infra Admin allowed.');
                    }
                } else if (meRes.status === 401 || meRes.status === 403) {
                     // Check if it's our own local token
                     const payloadStr = atob(token.split('.')[1]);
                     const payload = JSON.parse(payloadStr);
                     if (!payload.isInfraAdmin) {
                         throw new Error('Access Denied: Invalid Backup Token');
                     }
                }
            } catch (err) {
                // If it fails to fetch (network error / 502), check if token has our payload
                try {
                     const payloadStr = atob(token.split('.')[1]);
                     const payload = JSON.parse(payloadStr);
                     if (!payload.isInfraAdmin) {
                          throw new Error('Access Denied: Needs Infra Admin');
                     }
                } catch(decodeErr) {
                     console.warn('Could not decode token for backup validation', err);
                     throw new Error('Failed to validate access rights.');
                }
            }

            // Log login audit
            try {
                await fetch(`${CONFIG.MANAGER_URL}/audit/login`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
            } catch (err) {
                console.warn('Failed to audit login', err);
            }

            initControlPanel();
        } catch (error) {
            ui.login.error.textContent = error.message;
            ui.login.error.style.display = 'block';
            ui.login.form.style.transform = 'translateX(5px)';
            setTimeout(() => ui.login.form.style.transform = 'translateX(-5px)', 100);
            setTimeout(() => ui.login.form.style.transform = 'translateX(5px)', 200);
            setTimeout(() => ui.login.form.style.transform = 'translateX(0)', 300);
        } finally {
            ui.login.btn.disabled = false;
            ui.login.btn.textContent = 'Secure Login';
        }
    });

    // --- Control Panel Actions ---
    function initiateSwitch(targetMode) {
        if (state.isProcessing) return;

        // Immediate feedback and lock
        state.isProcessing = true;
        toggleButtons(false);

        const modeStr = targetMode === 'prod' ? 'Production' : 'Development';
        if (targetMode === state.mode) {
            if (!confirm(`Server is already running in ${modeStr} mode. Do you want to force restart it anyway?`)) {
                state.isProcessing = false;
                toggleButtons(true);
                return;
            }
        } else {
            if (!confirm(`Warning: Switching to ${modeStr} mode will restart the backend server. Existing connections may be temporarily dropped. Proceed?`)) {
                state.isProcessing = false;
                toggleButtons(true);
                return;
            }
        }

        executeStateTransition(targetMode);
    }

    async function executeStateTransition(targetMode) {
        // State is already locked by initiateSwitch
        stopLogStream();

        const modeStr = targetMode === 'prod' ? 'Production' : 'Development';
        streamNativeLog('SYSTEM', `Initiating transition to ${modeStr} mode...`, 'warn');

        try {
            // Trigger backend to restart the Strapi server in the target mode
            const switchUrl = targetMode === 'prod' 
                ? `${CONFIG.MANAGER_URL}/switch/prod` 
                : `${CONFIG.MANAGER_URL}/switch/dev`;
                
            streamNativeLog('SYSTEM', `Sending restart signal to ${switchUrl}`, 'info');

            const response = await fetch(switchUrl, {
                method: 'POST', // Adjust method if backend uses GET
                headers: {
                    'Authorization': `Bearer ${state.token}`
                }
            });

            if (response.status === 401 || response.status === 403) {
                return handleLogout("Your session has expired or you lack permissions. Please log in.");
            }

            if (response.status === 409) {
                 streamNativeLog('SYSTEM', `A process is already running. Please wait.`, 'error');
                 startStatusPolling();
                 return;
            }

            if (!response.ok) {
                throw new Error(`HTTP error! status: ${response.status}`);
            }
            
            streamNativeLog('SYSTEM', `Backend accepted the signal. Processing in background...`, 'success');

            // Set the active mode (optimistic)
            state.mode = targetMode;
            updateBadgeUI();
            
            // Re-connect to control log stream
            startLogStream('control');
            
            // Start polling to know when it finishes
            startStatusPolling();
            
        } catch (error) {
            streamNativeLog('SYSTEM', `Failed to switch modes: ${error.message}`, 'error');
            streamNativeLog('SYSTEM', `Are you sure the manager API is running at localhost:3000?`, 'warn');
        } finally {
            state.isProcessing = false;
            toggleButtons(true);
        }
    }

    async function restartService(mode) {
        if (state.isProcessing) return;

        const modeStr = mode === 'prod' ? 'Production' : 'Development';
        if (!confirm(`Are you sure you want to restart the ${modeStr} server?`)) {
            return;
        }

        state.isProcessing = true;
        toggleButtons(false);
        stopLogStream();

        streamNativeLog('SYSTEM', `Sending restart signal for ${modeStr} server...`, 'warn');

        try {
            const restartUrl = mode === 'prod' 
                ? `${CONFIG.MANAGER_URL}/restart/prod` 
                : `${CONFIG.MANAGER_URL}/restart/dev`;

            const response = await fetch(restartUrl, {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${state.token}`
                }
            });

            if (response.status === 401 || response.status === 403) {
                return handleLogout("Your session has expired or you lack permissions.");
            }

            if (!response.ok) {
                throw new Error(`HTTP error! status: ${response.status}`);
            }

            streamNativeLog('SYSTEM', `${modeStr} restart signal accepted. Waiting for server to boot...`, 'success');
            
            // Re-connect to control log stream
            startLogStream('control');
            
            // Start polling to know when it finishes
            startStatusPolling();

        } catch (error) {
            streamNativeLog('SYSTEM', `Failed to restart server: ${error.message}`, 'error');
            state.isProcessing = false;
            toggleButtons(true);
        }
    }


    function toggleButtons(enabled) {
        ui.cp.btnDev.disabled = !enabled;
        ui.cp.btnProd.disabled = !enabled;
        ui.cp.btnRestartDev.disabled = !enabled;
        ui.cp.btnRestartProd.disabled = !enabled;
        
        if (!enabled) {
            // Only show "Processing..." on the button that matches the current target mode
            if (state.targetMode === 'development' || (state.targetMode === null && state.mode === 'dev')) {
                ui.cp.btnDev.innerHTML = `<span class="pulse">Processing...</span>`;
                ui.cp.btnRestartDev.innerHTML = `<span class="pulse">Restarting...</span>`;
            } else if (state.targetMode === 'production' || (state.targetMode === null && state.mode === 'prod')) {
                ui.cp.btnProd.innerHTML = `<span class="pulse">Processing...</span>`;
                ui.cp.btnRestartProd.innerHTML = `<span class="pulse">Restarting...</span>`;
            } else {
                // Fallback for generic processing
                ui.cp.btnDev.innerHTML = `<span class="pulse">Processing...</span>`;
                ui.cp.btnProd.innerHTML = `<span class="pulse">Processing...</span>`;
            }

            ui.cp.btnDev.style.pointerEvents = 'none';
            ui.cp.btnProd.style.pointerEvents = 'none';
            ui.cp.btnRestartDev.style.pointerEvents = 'none';
            ui.cp.btnRestartProd.style.pointerEvents = 'none';
        } else {
            // Restore original HTML
            ui.cp.btnDev.innerHTML = `<svg style="width:18px;height:18px;margin-right:8px;" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4"></path></svg>Switch to Development Mode`;
            ui.cp.btnProd.innerHTML = `<svg style="width:18px;height:18px;margin-right:8px;" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>Switch to Production (Build + Start)`;
            ui.cp.btnRestartDev.innerHTML = `<svg style="width:18px;height:18px;margin-right:8px;" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>Restart Development Server`;
            ui.cp.btnRestartProd.innerHTML = `<svg style="width:18px;height:18px;margin-right:8px;" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>Restart Production Server`;
            
            // Restore pointer events
            ui.cp.btnDev.style.pointerEvents = 'auto';
            ui.cp.btnProd.style.pointerEvents = 'auto';           
            ui.cp.btnRestartDev.style.pointerEvents = 'auto';
            ui.cp.btnRestartProd.style.pointerEvents = 'auto';
        }
    }

    function updateBadgeUI(progressMessage) {

        if (state.mode === 'transitioning' || state.isProcessing) {
            ui.cp.badge.className = 'badge prod'; // Or a custom transitioning class
            ui.cp.badge.style.backgroundColor = 'rgba(107, 114, 128, 0.1)';
            ui.cp.badge.style.color = '#6b7280';
            ui.cp.badge.style.border = '1px solid rgba(107, 114, 128, 0.2)';
            
            const targetText = state.targetMode === 'production' ? 'PROD' : (state.targetMode === 'development' ? 'DEV' : '');
            ui.cp.badge.textContent = targetText ? `SWITCHING TO ${targetText}...` : `PROCESSING...`;
            
            // Re-use logic to disable buttons
            toggleButtons(false); 
        } else if (state.mode === 'prod') {
            ui.cp.badge.className = 'badge prod';
            ui.cp.badge.style = ''; // Reset inline styles
            ui.cp.badge.textContent = 'Mode: Production';
            ui.cp.btnDev.style.display = 'inline-flex';
            ui.cp.btnProd.style.display = 'none';
            ui.cp.btnRestartDev.style.display = 'none';
            ui.cp.btnRestartProd.style.display = 'inline-flex';
        } else {
            ui.cp.badge.className = 'badge dev';
            ui.cp.badge.style = ''; // Reset inline styles
            ui.cp.badge.textContent = 'Mode: Development';
            ui.cp.btnDev.style.display = 'none';
            ui.cp.btnProd.style.display = 'inline-flex';
            ui.cp.btnRestartDev.style.display = 'inline-flex';
            ui.cp.btnRestartProd.style.display = 'none';
        }
    }

    // --- Logging System ---
    function streamNativeLog(source, message, level = 'info') {
        const time = new Date().toLocaleTimeString('en-US', { hour12: false });
        
        let levelClass = 'log-info';
        if (level === 'warn') levelClass = 'log-warn';
        if (level === 'error') levelClass = 'log-error';
        if (level === 'success') levelClass = 'log-success';
        if (level === 'system') levelClass = 'log-system';

        const line = document.createElement('div');
        line.className = 'log-line';
        line.innerHTML = `<span class="log-time">[${time}]</span> <span class="log-source ${levelClass}">[${source}]</span> <span>${message}</span>`;
        
        ui.cp.terminal.appendChild(line);
        ui.cp.terminal.scrollTop = ui.cp.terminal.scrollHeight;
    }

    function appendRawLog(htmlContent) {
        const terminal = ui.cp.terminal;
        // Check if user is at the bottom (with a 50px buffer)
        const isAtBottom = terminal.scrollHeight - terminal.clientHeight <= terminal.scrollTop + 50;

        const line = document.createElement('div');
        line.className = 'log-line';
        line.style.marginBottom = '0'; 
        line.innerHTML = htmlContent;
        
        terminal.appendChild(line);

        // Only auto-scroll if the user was already at the bottom
        if (isAtBottom) {
            terminal.scrollTop = terminal.scrollHeight;
        }
    }

    function ansiToHtml(text) {
        const ansiColors = {
            '30': '#000000', '31': '#ef4444', '32': '#10b981', '33': '#f59e0b',
            '34': '#3b82f6', '35': '#8b5cf6', '36': '#06b6d4', '37': '#ffffff',
            '90': '#6b7280', '39': 'inherit', '0': 'inherit'
        };
        
        // Escape HTML
        let html = text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        
        let result = '';
        let spanCount = 0;
        
        const parts = html.split(/(?:\x1b|\\x1b|\\u001b)\[(\d+(?:;\d+)*)m/);
        
        result += parts[0];
        for (let i = 1; i < parts.length; i += 2) {
            const code = parts[i];
            const textContent = parts[i + 1];
            
            if (code === '0' || code === '39') {
                while (spanCount > 0) {
                    result += '</span>';
                    spanCount--;
                }
            } else if (ansiColors[code]) {
                result += `<span style="color: ${ansiColors[code]}">`;
                spanCount++;
            }
            
            if (textContent) result += textContent;
        }
        
        while (spanCount > 0) {
            result += '</span>';
            spanCount--;
        }
        
        return result;
    }

    // --- Stream Logs (SSE) ---
    function startLogStream(mode) {
    const url = `${CONFIG.MANAGER_URL}/logs/stream/${mode}?token=${state.token}`;
    const evtSource = new EventSource(url);
    state.logEventSource = evtSource;

    evtSource.onerror = function() {
        // SSE error commonly happens when unauthorized or connection drops.
        console.error("EventSource failed. Connection dropped or token expired.");
        handleLogout("Log stream disconnected. Your session may have expired.");
    };

    evtSource.onmessage = function(event) {
        const data = JSON.parse(event.data);
        appendRawLog(ansiToHtml(data));

        // --- THE DYNAMIC CHECK ---
        // We look for the specific Strapi "Ready" text
        if (data.includes("http://localhost:1337") || data.includes("started successfully")) {
            
            // This is the magic part: 
            // We set isProcessing to false ONLY when the text appears
            state.isProcessing = false; 
            toggleButtons(true); // Buttons become clickable again
            
            streamNativeLog('SYSTEM', 'Strapi is LIVE!', 'success');
        }
    };
}

    function stopLogStream() {
        if (state.logEventSource) {
            state.logEventSource.close();
            state.logEventSource = null;
        }
    }
    // --- Initial Authentication Check ---
    async function checkAuthOnLoad() {
        const savedToken = localStorage.getItem('strapi_manager_token');
        if (!savedToken) return; // No token found, show normal login

        // Optimistically set the token and show "authenticating..." visually
        state.token = savedToken;
        ui.login.btn.disabled = true;
        ui.login.btn.innerHTML = `<span class="pulse">Resuming Session...</span>`;

        try {
            // Validate the saved token by checking roles exactly like normal login
            const meRes = await fetch(`${CONFIG.API_URL}/admin/users/me`, {
                method: 'GET',
                headers: { 'Authorization': `Bearer ${state.token}` }
            });

            if (!meRes.ok) throw new Error('Token expired');
            
            const meData = await meRes.json();
            const roles = meData.data.roles || [];
            const isInfraAdmin = roles.some(r => r.name === 'Infra Admin');

            if (!isInfraAdmin) throw new Error('Unauthorized role');

            // If we successfully validated the token and role, bypass login
            initControlPanel();

        } catch (error) {
            // Token is invalid/expired - clear it and let them log in normally
            localStorage.removeItem('strapi_manager_token');
            state.token = null;
            ui.login.btn.disabled = false;
            ui.login.btn.textContent = 'Secure Login';
        }
    }

    // Call check immediately on load
    checkAuthOnLoad();

</script>
